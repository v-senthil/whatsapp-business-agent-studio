<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meta Business Agent Platform</title>
    <link rel="stylesheet" href="/vendor/zudoku/zudoku.css" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; }
      #zudoku-root { min-height: 100vh; }
    </style>
    <script>
      // Zudoku's Rp parser only treats data-api-url as a URL if it contains "://".
      // Set an absolute URL BEFORE the module script runs so the parser recognizes it.
      // The classic script tag below is deferred? No — no defer attr — so it runs
      // synchronously as the parser reaches it, which is before the module below.
      (function () {
        var el = document.getElementById("zudoku-root");
        el.setAttribute("data-api-url", window.location.origin + "/openapi.json");
        // Sync the docs theme with the parent app if we're embedded via iframe.
        try {
          var parentTheme = window.parent && window.parent.document
            && window.parent.document.documentElement.classList.contains("dark");
          if (parentTheme) document.documentElement.classList.add("dark");
        } catch (_) { /* cross-origin — ignore */ }
      })();
    </script>
    <script type="module" src="/vendor/zudoku/main.js"></script>
  </head>
  <body>
    <div id="zudoku-root"></div>
  </body>
</html>
