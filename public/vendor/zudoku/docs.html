<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meta Business Agent Platform</title>
    <link rel="stylesheet" href="/vendor/zudoku/zudoku.css" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; }
      #zudoku-root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="zudoku-root"></div>
    <script>
      // Zudoku's Rp parser only treats data-api-url as a URL if it contains "://".
      // Runs synchronously right after the div is parsed — before the deferred
      // ES module below reads the attribute.
      (function () {
        var el = document.getElementById("zudoku-root");
        if (!el) return;
        el.setAttribute("data-api-url", window.location.origin + "/openapi.json");
        // Match parent theme if we're inside a same-origin iframe.
        try {
          if (window.parent && window.parent !== window
              && window.parent.document.documentElement.classList.contains("dark")) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) { /* cross-origin — ignore */ }
      })();
    </script>
    <script type="module" src="/vendor/zudoku/main.js"></script>
  </body>
</html>
