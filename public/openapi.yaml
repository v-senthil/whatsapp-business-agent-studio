  /{entity_id}/agent_connectors/{connector_id}/logs:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
      - $ref: "#/components/parameters/ConnectorId"
    get:
      tags: [Connector Logs]
      operationId: listConnectorLogs
      summary: Retrieve connector error logs, optionally aggregated with stats.
      description: >-
        Time range (end_time - start_time) must not exceed 7 days. Logs are only
        available for the last 7 days.
      parameters:
        - in: query
          name: start_time
          schema: { type: integer }
          description: Start Unix timestamp (seconds). Defaults to 24 hours ago.
        - in: query
          name: end_time
          schema: { type: integer }
          description: End Unix timestamp (seconds). Defaults to now.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
        - in: query
          name: tool_id
          schema: { type: string }
          description: Optional tool ID to filter logs.
        - in: query
          name: include_stats
          schema: { type: boolean, default: false }
        - in: query
          name: summary_only
          schema: { type: boolean, default: false }
        - in: query
          name: top_n
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
      responses:
        "200":
          description: Log entries or failure patterns, with optional statistics.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectorLogsResponse" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

