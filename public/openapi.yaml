openapi: 3.1.0
info:
  title: Meta Business Agent Platform
  version: 2.0.0
  description: >-
    OpenAPI specification for the Meta Business Agent Platform APIs used by the
    WABIZAgent application. Covers onboarding, agent configuration (settings,
    business info, skills, knowledge files, websites, FAQs, allowlist),
    connectors and their tools, evaluation, agent test, agent events, and
    thread control. All endpoints under `/{entity_id}/...` accept `X-API-Version: 2.0.0`.
    The thread control endpoint under `/business/whatsapp/phone_numbers/...`
    uses `X-API-Version: 1.0.0`.

servers:
  - url: https://api.facebook.com

security:
  - bearerAuth: []

tags:
  - name: Onboarding
    description: Eligibility check, onboarding a new agent, and agent settings.
  - name: Settings
    description: Read and update AI agent settings.
  - name: Business Info
    description: Structured business information used as knowledge.
  - name: Skills
    description: AI skill definitions applied by the agent.
  - name: Knowledge Files
    description: Files uploaded to the agent knowledge base.
  - name: Knowledge Websites
    description: Websites crawled into the agent knowledge base.
  - name: Knowledge FAQs
    description: Frequently asked questions used as knowledge.
  - name: Allowlist
    description: Consumer phone numbers allowlisted for the agent.
  - name: Connectors
    description: External API connectors for the agent.
  - name: Connector Credentials
    description: Endpoints to upsert connector credentials (API key, OAuth, mTLS).
  - name: Connector Logs
    description: Error logs and stats for a connector.
  - name: Tools
    description: Connector tools that the agent can invoke.
  - name: Evaluation
    description: Agent evaluation cases, jobs, details, and summaries.
  - name: Agent Test
    description: Send a test message directly to the agent pipeline.
  - name: Agent Events
    description: Trigger and poll asynchronous agent events.
  - name: Thread Control
    description: WhatsApp Cloud API thread control endpoints.

paths:
  /{entity_id}/agent_eligibility:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    get:
      tags: [Onboarding]
      operationId: getAgentEligibility
      summary: Check whether an entity is eligible for the business AI agent.
      responses:
        "200":
          description: Eligibility result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityResponse"
        "400":
          description: Bad request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /{entity_id}/agent_onboarding:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    post:
      tags: [Onboarding]
      operationId: createAgentOnboarding
      summary: Trigger AI agent onboarding for a channel.
      parameters:
        - in: query
          name: channel
          required: true
          schema:
            $ref: "#/components/schemas/Channel"
      responses:
        "201":
          description: Onboarding triggered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResponse"
        "400":
          description: Bad request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /{entity_id}/agent_config/settings:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    get:
      tags: [Settings]
      operationId: getAgentSettings
      summary: Retrieve AI agent settings for the entity.
      parameters:
        - in: query
          name: agent_id
          schema: { type: string }
          description: Optional agent ID to target a specific configuration.
      responses:
        "200":
          description: List of AI settings.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgentSettings" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    put:
      tags: [Settings]
      operationId: updateAgentSettings
      summary: Create or fully replace AI agent settings.
      parameters:
        - in: query
          name: agent_id
          schema: { type: string }
          description: Optional agent ID to target a specific configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSettingsRequest"
      responses:
        "200":
          description: Updated AI settings.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentSettings" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/business_info:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    get:
      tags: [Business Info]
      operationId: getBusinessInfo
      summary: Retrieve business information.
      responses:
        "200":
          description: Current business information.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessInfo" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    put:
      tags: [Business Info]
      operationId: updateBusinessInfo
      summary: Create or replace business information.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BusinessInfo" }
      responses:
        "200":
          description: Updated business information.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessInfo" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    delete:
      tags: [Business Info]
      operationId: resetBusinessInfo
      summary: Reset business info to defaults.
      responses:
        "200":
          description: Default business info after reset.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessInfo" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/skills:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    get:
      tags: [Skills]
      operationId: listSkills
      summary: List all AI skills.
      parameters:
        - in: query
          name: agent_id
          schema: { type: string }
          description: Optional settings ID to filter skills.
      responses:
        "200":
          description: A list of all skills.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Skill" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    post:
      tags: [Skills]
      operationId: createSkill
      summary: Create a new AI skill.
      parameters:
        - in: query
          name: agent_id
          schema: { type: string }
          description: Optional settings ID under which to create the skill.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SkillRequest" }
      responses:
        "201":
          description: The newly created skill.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Skill" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/skills/{skill_id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
      - in: path
        name: skill_id
        required: true
        schema: { type: string }
        description: The unique identifier of the skill.
    get:
      tags: [Skills]
      operationId: getSkill
      summary: Retrieve a specific AI skill.
      responses:
        "200":
          description: The requested skill.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Skill" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    put:
      tags: [Skills]
      operationId: updateSkill
      summary: Update a specific AI skill.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SkillRequest" }
      responses:
        "200":
          description: The updated skill.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Skill" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    delete:
      tags: [Skills]
      operationId: deleteSkill
      summary: Delete a specific AI skill.
      responses:
        "204":
          description: Skill successfully deleted.
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/files:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    get:
      tags: [Knowledge Files]
      operationId: listKnowledgeFiles
      summary: List all knowledge base files.
      responses:
        "200":
          description: List of files.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/KnowledgeFile" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    post:
      tags: [Knowledge Files]
      operationId: uploadKnowledgeFile
      summary: Upload a new file to the knowledge base.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file_name, file]
              properties:
                file_name:
                  type: string
                  description: The display name of the uploaded file.
                file:
                  type: string
                  format: binary
                  description: >-
                    The file contents. Max 100 MB. Supported types include
                    .pdf, .doc, .docx, .png, .jpg, .jpeg, and (when enabled)
                    .csv and .xlsx.
      responses:
        "201":
          description: Uploaded file metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeFile" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/files/{file_id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
      - in: path
        name: file_id
        required: true
        schema: { type: string }
        description: The unique identifier of the file.
    get:
      tags: [Knowledge Files]
      operationId: getKnowledgeFile
      summary: Retrieve knowledge file metadata.
      responses:
        "200":
          description: File metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeFile" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    delete:
      tags: [Knowledge Files]
      operationId: deleteKnowledgeFile
      summary: Delete a knowledge file.
      responses:
        "204":
          description: File deleted.
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/websites:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    get:
      tags: [Knowledge Websites]
      operationId: listKnowledgeWebsites
      summary: List all crawled website entries.
      responses:
        "200":
          description: List of website crawl entries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/KnowledgeWebsite" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    post:
      tags: [Knowledge Websites]
      operationId: createKnowledgeWebsite
      summary: Add a website URL to be crawled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
      responses:
        "201":
          description: New website crawl entry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeWebsite" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/websites/{website_id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
      - in: path
        name: website_id
        required: true
        schema: { type: string }
        description: The unique identifier of the website crawl entry.
    get:
      tags: [Knowledge Websites]
      operationId: getKnowledgeWebsite
      summary: Retrieve a website crawl entry.
      responses:
        "200":
          description: The requested crawl entry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeWebsite" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    put:
      tags: [Knowledge Websites]
      operationId: updateKnowledgeWebsite
      summary: Update a website crawl entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
      responses:
        "200":
          description: Updated crawl entry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeWebsite" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    delete:
      tags: [Knowledge Websites]
      operationId: deleteKnowledgeWebsite
      summary: Delete a website crawl entry.
      responses:
        "204":
          description: Website crawl entry deleted.
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/faq:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    get:
      tags: [Knowledge FAQs]
      operationId: listFaqs
      summary: List all FAQ entries.
      responses:
        "200":
          description: A list of FAQ entries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Faq" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    post:
      tags: [Knowledge FAQs]
      operationId: createFaq
      summary: Add an FAQ entry.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FaqRequest" }
      responses:
        "201":
          description: Newly created FAQ.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Faq" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/faq/{faq_id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
      - in: path
        name: faq_id
        required: true
        schema: { type: string }
        description: The unique identifier of the FAQ entry.
    get:
      tags: [Knowledge FAQs]
      operationId: getFaq
      summary: Retrieve a specific FAQ entry.
      responses:
        "200":
          description: The requested FAQ.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Faq" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    put:
      tags: [Knowledge FAQs]
      operationId: updateFaq
      summary: Update a FAQ entry.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FaqRequest" }
      responses:
        "200":
          description: Updated FAQ.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Faq" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    delete:
      tags: [Knowledge FAQs]
      operationId: deleteFaq
      summary: Delete a FAQ entry.
      responses:
        "204":
          description: FAQ deleted.
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/allowlist:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    get:
      tags: [Allowlist]
      operationId: listAllowlistEntries
      summary: Retrieve all allowlisted consumer phone numbers.
      responses:
        "200":
          description: List of allowlist entries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AllowlistEntry" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    post:
      tags: [Allowlist]
      operationId: createAllowlistEntry
      summary: Add a phone number to the allowlist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [consumer_phone_number]
              properties:
                consumer_phone_number:
                  type: string
                  description: Consumer phone number in E.164 format.
                  example: "+15551234567"
      responses:
        "201":
          description: New allowlist entry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AllowlistEntry" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_config/allowlist/{entry_id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
      - in: path
        name: entry_id
        required: true
        schema: { type: string }
        description: The unique identifier of the allowlist entry.
    delete:
      tags: [Allowlist]
      operationId: deleteAllowlistEntry
      summary: Remove a specific allowlist entry.
      responses:
        "204":
          description: Allowlist entry deleted.
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_connectors:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    get:
      tags: [Connectors]
      operationId: listConnectors
      summary: List all connectors for the entity.
      responses:
        "200":
          description: List of connectors.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Connector" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    post:
      tags: [Connectors]
      operationId: createConnector
      summary: Create a new connector.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConnectorRequest" }
      responses:
        "201":
          description: Newly created connector.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connector" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  /{entity_id}/agent_connectors/{connector_id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
      - $ref: "#/components/parameters/ConnectorId"
    get:
      tags: [Connectors]
      operationId: getConnector
      summary: Retrieve a specific connector.
      responses:
        "200":
          description: The requested connector.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connector" }
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    put:
      tags: [Connectors]
      operationId: updateConnector
      summary: Update a specific connector.
      requestBody:
        required: true
        content:
          application/json:
