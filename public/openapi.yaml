  /{entity_id}/agent-eval/run:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
    post:
      tags: [Evaluation]
      operationId: startEvalRun
      summary: Submit an evaluation job across the given eval cases.
      parameters:
        - in: query
          name: eval_case_ids
          required: true
          schema: { type: string }
          description: Comma-separated list of eval case IDs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: >-
                Combo evaluation job configuration. Currently accepts an empty
                object.
      responses:
        "200":
          description: Acknowledgment that the job was accepted.
          content:
            application/json:
              schema:
                type: object
                required: [job_id, status]
                properties:
                  job_id:
                    type: string
                    description: The unique identifier for the created evaluation job.
                  status:
                    type: string
                    description: "Initial job status (e.g. QUEUED / PENDING)."
        "400":
          description: Bad request.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Unauthorized.
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
    get:
      tags: [Evaluation]
      operationId: getEvalRun
      summary: Poll the status of a previously submitted evaluation job.
      parameters:
        - in: query
          name: job_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Current job status and results (if completed).
          content:
