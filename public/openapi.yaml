  /{entity_id}/agent_connectors/{connector_id}/upsertCertificate:
    parameters:
      - $ref: "#/components/parameters/EntityId"
      - $ref: "#/components/parameters/ApiVersion2"
      - $ref: "#/components/parameters/ConnectorId"
    post:
      tags: [Connector Credentials]
      operationId: upsertConnectorCertificate
      summary: Upload or rotate the mTLS client certificate for a connector.
      requestBody:
