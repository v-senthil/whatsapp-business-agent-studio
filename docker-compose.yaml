# WhatsApp Business Agent Studio, Docker Compose.
#
# Works with Docker Desktop and `docker compose up`. Apple's native
# `container` CLI does not implement compose; use the `container build`
# and `container run` commands documented in the README for that runtime.
#
# Environment variables are read from `.env` in this same folder (Compose
# does this automatically). Copy `.env.example` to `.env` and fill in
# real values before starting.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wabizagent:latest
    container_name: wabizagent
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required and must be 32+ chars}
      META_API_BASE: ${META_API_BASE:-https://api.facebook.com}
      GRAPH_API_BASE: ${GRAPH_API_BASE:-https://graph.facebook.com/v20.0}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
